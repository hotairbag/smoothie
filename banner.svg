<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="card" x1="440" y1="140" x2="760" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c2333"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="460" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="460" fill="url(#grid)"/>

  <!-- Title -->
  <g opacity="0">
    <text x="600" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="700" fill="#ffffff" letter-spacing="-1">smoothie</text>
    <text x="600" y="100" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#8b949e" letter-spacing="0.5">multi-model review for Claude Code</text>
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.8s" fill="freeze" repeatCount="1"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="13s" dur="0.8s" fill="freeze"/>
  </g>

  <!-- /smoothie command -->
  <g opacity="0">
    <rect x="60" y="235" width="200" height="50" rx="25" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="160" y="266" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="18" font-weight="600" fill="#a78bfa">/smoothie</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.5s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="13.6s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Arrow 1: dashed line that draws in -->
  <g opacity="0">
    <line x1="280" y1="260" x2="420" y2="260" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="6 4"/>
    <polygon points="420,254 432,260 420,266" fill="#8b949e"/>
    <text x="355" y="246" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#58a6ff">parallel query</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.4s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="14.2s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Center card -->
  <g opacity="0">
    <rect x="445" y="155" width="310" height="250" rx="16" fill="url(#card)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="600" y="188" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#58a6ff" letter-spacing="1.5">REVIEWS PLAN</text>
    <line x1="478" y1="203" x2="722" y2="203" stroke="#30363d" stroke-width="1"/>
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.5s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="14.6s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Model pill: Opus -->
  <g opacity="0">
    <rect x="478" y="218" width="244" height="36" rx="8" fill="#7c3aed" fill-opacity="0.1" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="498" cy="236" r="5" fill="#a78bfa"/>
    <text x="513" y="241" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#e2e8f0">Opus 4.6</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="15.2s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Model pill: GPT Codex -->
  <g opacity="0">
    <rect x="478" y="262" width="244" height="36" rx="8" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="498" cy="280" r="5" fill="#34d399"/>
    <text x="513" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#e2e8f0">GPT 5.4 Codex</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.3s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="15.5s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Model pill: Gemini -->
  <g opacity="0">
    <rect x="478" y="306" width="244" height="36" rx="8" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="498" cy="324" r="5" fill="#60a5fa"/>
    <text x="513" y="329" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#e2e8f0">Gemini 3.1 Pro</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="15.8s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Model pill: Grok -->
  <g opacity="0">
    <rect x="478" y="350" width="155" height="36" rx="8" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="498" cy="368" r="5" fill="#fbbf24"/>
    <text x="513" y="373" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#e2e8f0">Grok 4.20</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.3s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="16.1s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Model pill: others -->
  <g opacity="0">
    <rect x="641" y="350" width="81" height="36" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#30363d" stroke-width="1"/>
    <text x="681" y="373" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#8b949e">others...</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.3s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="16.4s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Arrow 2 -->
  <g opacity="0">
    <line x1="768" y1="260" x2="898" y2="260" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="6 4"/>
    <polygon points="898,254 910,260 898,266" fill="#8b949e"/>
    <text x="838" y="246" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#58a6ff">Claude judges</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.4s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="17.0s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Refined output -->
  <g opacity="0" filter="url(#glow)">
    <rect x="923" y="228" width="220" height="64" rx="14" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="1033" y="256" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#34d399">refined output</text>
    <text x="1033" y="278" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#6ee7b7" fill-opacity="0.7">one blended response</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.6s" dur="0.6s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="12s"/>
    <animate attributeName="opacity" from="0" to="1" begin="17.6s" dur="0.6s" fill="freeze"/>
  </g>
</svg>
