<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none">
  <style>
    /* 12s cycle */
    @keyframes shineIn {
      0% { opacity: 0; filter: blur(10px) brightness(2); }
      4% { opacity: 1; filter: blur(3px) brightness(1.4); }
      8% { opacity: 1; filter: blur(0) brightness(1); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes fadeUp {
      0%, 100% { opacity: 0; transform: translateY(8px); }
      5% { opacity: 1; transform: translateY(0); }
      75% { opacity: 1; transform: translateY(0); }
      83% { opacity: 0; transform: translateY(0); }
    }
    @keyframes cmdIn {
      0%, 7% { opacity: 0; transform: translateY(8px); }
      11% { opacity: 1; transform: translateY(0); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes cmdTextIn {
      0%, 11% { opacity: 0; }
      14% { opacity: 1; }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes blink12 {
      0%, 11% { opacity: 0; }
      11.1% { opacity: 1; }
      12% { opacity: 0; }
      12.5% { opacity: 1; }
      13% { opacity: 0; }
      13.5%, 75% { opacity: 1; }
      83%, 100% { opacity: 0; }
    }
    @keyframes pathsIn {
      0%, 14% { opacity: 0; }
      20% { opacity: 1; }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes labelIn {
      0%, 16% { opacity: 0; }
      20% { opacity: 0.7; }
      75% { opacity: 0.7; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes m1 {
      0%, 22% { opacity: 0; transform: translateY(8px); }
      26% { opacity: 1; transform: translateY(0); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes m2 {
      0%, 24% { opacity: 0; transform: translateY(8px); }
      28% { opacity: 1; transform: translateY(0); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes m3 {
      0%, 26% { opacity: 0; transform: translateY(8px); }
      30% { opacity: 1; transform: translateY(0); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes m4 {
      0%, 28% { opacity: 0; transform: translateY(8px); }
      32% { opacity: 1; transform: translateY(0); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes sv1 {
      0%, 22% { opacity: 0; }
      23% { opacity: 1; }
      40% { opacity: 1; }
      41% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes sv2 {
      0%, 24% { opacity: 0; }
      25% { opacity: 1; }
      43% { opacity: 1; }
      44% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes sv3 {
      0%, 26% { opacity: 0; }
      27% { opacity: 1; }
      46% { opacity: 1; }
      47% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes sv4 {
      0%, 28% { opacity: 0; }
      29% { opacity: 1; }
      49% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes c1 {
      0%, 40% { opacity: 0; transform: scale(0); }
      42% { opacity: 1; transform: scale(1.15); }
      43% { opacity: 1; transform: scale(1); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes c2 {
      0%, 43% { opacity: 0; transform: scale(0); }
      45% { opacity: 1; transform: scale(1.15); }
      46% { opacity: 1; transform: scale(1); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes c3 {
      0%, 46% { opacity: 0; transform: scale(0); }
      48% { opacity: 1; transform: scale(1.15); }
      49% { opacity: 1; transform: scale(1); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes c4 {
      0%, 49% { opacity: 0; transform: scale(0); }
      51% { opacity: 1; transform: scale(1.15); }
      52% { opacity: 1; transform: scale(1); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes d1 { 0%, 40% { opacity: 0; } 41% { opacity: 1; } 75% { opacity: 1; } 83% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes d2 { 0%, 43% { opacity: 0; } 44% { opacity: 1; } 75% { opacity: 1; } 83% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes d3 { 0%, 46% { opacity: 0; } 47% { opacity: 1; } 75% { opacity: 1; } 83% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes d4 { 0%, 49% { opacity: 0; } 50% { opacity: 1; } 75% { opacity: 1; } 83% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes judgeLabel {
      0%, 52% { opacity: 0; }
      56% { opacity: 0.7; }
      75% { opacity: 0.7; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes outputIn {
      0%, 56% { opacity: 0; filter: blur(10px) brightness(2); }
      60% { opacity: 1; filter: blur(3px) brightness(1.4); }
      64% { opacity: 1; filter: blur(0) brightness(1); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes ol1 {
      0%, 62% { opacity: 0; transform: translateY(8px); }
      65% { opacity: 1; transform: translateY(0); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes ol2 {
      0%, 64% { opacity: 0; transform: translateY(8px); }
      67% { opacity: 1; transform: translateY(0); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes ol3 {
      0%, 66% { opacity: 0; transform: translateY(8px); }
      69% { opacity: 1; transform: translateY(0); }
      75% { opacity: 1; }
      83% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .title { animation: shineIn 12s ease infinite; }
    .subtitle { animation: fadeUp 12s ease infinite; }
    .cmd-box { animation: cmdIn 12s ease infinite; }
    .cmd-text { animation: cmdTextIn 12s ease infinite; }
    .cmd-cursor { animation: blink12 12s ease infinite; }
    .paths { animation: pathsIn 12s ease infinite; }
    .label-par { animation: labelIn 12s ease infinite; }
    .label-judge { animation: judgeLabel 12s ease infinite; }
    .m1 { animation: m1 12s ease infinite; }
    .m2 { animation: m2 12s ease infinite; }
    .m3 { animation: m3 12s ease infinite; }
    .m4 { animation: m4 12s ease infinite; }
    .sp1 { transform-origin: 448px 165px; animation: spin 0.7s linear infinite, sv1 12s ease infinite; }
    .sp2 { transform-origin: 448px 225px; animation: spin 0.7s linear infinite, sv2 12s ease infinite; }
    .sp3 { transform-origin: 448px 285px; animation: spin 0.7s linear infinite, sv3 12s ease infinite; }
    .sp4 { transform-origin: 448px 345px; animation: spin 0.7s linear infinite, sv4 12s ease infinite; }
    .ck1 { transform-origin: 448px 165px; animation: c1 12s ease infinite; }
    .ck2 { transform-origin: 448px 225px; animation: c2 12s ease infinite; }
    .ck3 { transform-origin: 448px 285px; animation: c3 12s ease infinite; }
    .ck4 { transform-origin: 448px 345px; animation: c4 12s ease infinite; }
    .dn1 { animation: d1 12s ease infinite; }
    .dn2 { animation: d2 12s ease infinite; }
    .dn3 { animation: d3 12s ease infinite; }
    .dn4 { animation: d4 12s ease infinite; }
    .output-card { animation: outputIn 12s ease infinite; }
    .output-float { animation: gentleFloat 3s ease-in-out infinite; }
    .ol1 { animation: ol1 12s ease infinite; }
    .ol2 { animation: ol2 12s ease infinite; }
    .ol3 { animation: ol3 12s ease infinite; }
  </style>

  <defs>
    <linearGradient id="orange-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f78166" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f78166"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="440" fill="#0d1117"/>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.5" fill="#f0f6fc" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="440" fill="url(#dots)"/>
  <line x1="100" y1="105" x2="1100" y2="105" stroke="#21262d" stroke-width="0.5"/>
  <line x1="100" y1="418" x2="1100" y2="418" stroke="#21262d" stroke-width="0.5"/>

  <!-- Title -->
  <text class="title" x="600" y="55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">smoothie</text>
  <text class="subtitle" x="600" y="85" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#7d8590" letter-spacing="0.5">multi-model review for Claude Code</text>

  <!-- Terminal -->
  <g class="cmd-box">
    <rect x="42" y="225" width="195" height="65" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#sh)"/>
    <circle cx="60" cy="240" r="4" fill="#f85149" fill-opacity="0.7"/>
    <circle cx="73" cy="240" r="4" fill="#d29922" fill-opacity="0.7"/>
    <circle cx="86" cy="240" r="4" fill="#3fb950" fill-opacity="0.7"/>
  </g>
  <g class="cmd-text">
    <text x="58" y="272" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7d8590">$</text>
    <text x="72" y="272" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#f0f6fc">/smoothie</text>
  </g>
  <rect class="cmd-cursor" x="148" y="260" width="7" height="14" rx="1" fill="#f78166"/>

  <!-- Branching paths (base, always dashed) -->
  <g class="paths" stroke="#30363d" stroke-width="1.5" fill="none" stroke-dasharray="4 4">
    <!-- Left fan-out -->
    <path d="M 250 258 L 320 258 L 320 165 L 430 165"/>
    <path d="M 250 258 L 320 258 L 320 225 L 430 225"/>
    <path d="M 250 258 L 320 258 L 320 285 L 430 285"/>
    <path d="M 250 258 L 320 258 L 320 345 L 430 345"/>
    <!-- Right converge -->
    <path d="M 680 165 L 790 165 L 790 258 L 860 258"/>
    <path d="M 680 225 L 790 225 L 790 258 L 860 258"/>
    <path d="M 680 285 L 790 285 L 790 258 L 860 258"/>
    <path d="M 680 345 L 790 345 L 790 258 L 860 258"/>
  </g>

  <!-- Junction dots -->
  <g class="paths">
    <rect x="318" y="256" width="4" height="4" rx="1" fill="#484f58"/>
    <rect x="788" y="256" width="4" height="4" rx="1" fill="#484f58"/>
  </g>

  <!-- Labels -->
  <text class="label-par" x="285" y="240" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#f78166">parallel query</text>
  <text class="label-judge" x="825" y="240" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#3fb950">Claude judges</text>

  <!-- === MODEL CARDS === -->

  <!-- Opus -->
  <g class="m1">
    <rect x="430" y="143" width="250" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="472" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">Opus 4.6</text>
    <rect x="440" y="178" width="230" height="3" rx="1.5" fill="#21262d"/>
  </g>
  <g class="sp1"><circle cx="448" cy="165" r="5" fill="none" stroke="#f78166" stroke-width="1.5" stroke-dasharray="20 12" stroke-linecap="round"/></g>
  <g class="ck1">
    <circle cx="448" cy="165" r="6" fill="#3fb950" fill-opacity="0.15"/>
    <path d="M 443 165 L 446.5 168.5 L 453 162" stroke="#3fb950" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="dn1" x="670" y="170" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">2.1s</text>

  <!-- GPT Codex -->
  <g class="m2">
    <rect x="430" y="203" width="250" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="472" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">GPT 5.4 Codex</text>
    <rect x="440" y="238" width="230" height="3" rx="1.5" fill="#21262d"/>
  </g>
  <g class="sp2"><circle cx="448" cy="225" r="5" fill="none" stroke="#f78166" stroke-width="1.5" stroke-dasharray="20 12" stroke-linecap="round"/></g>
  <g class="ck2">
    <circle cx="448" cy="225" r="6" fill="#3fb950" fill-opacity="0.15"/>
    <path d="M 443 225 L 446.5 228.5 L 453 222" stroke="#3fb950" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="dn2" x="670" y="230" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">3.8s</text>

  <!-- Gemini -->
  <g class="m3">
    <rect x="430" y="263" width="250" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="472" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">Gemini 3.1 Pro</text>
    <rect x="440" y="298" width="230" height="3" rx="1.5" fill="#21262d"/>
  </g>
  <g class="sp3"><circle cx="448" cy="285" r="5" fill="none" stroke="#f78166" stroke-width="1.5" stroke-dasharray="20 12" stroke-linecap="round"/></g>
  <g class="ck3">
    <circle cx="448" cy="285" r="6" fill="#3fb950" fill-opacity="0.15"/>
    <path d="M 443 285 L 446.5 288.5 L 453 282" stroke="#3fb950" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="dn3" x="670" y="290" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">4.2s</text>

  <!-- Grok -->
  <g class="m4">
    <rect x="430" y="323" width="250" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="472" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">Grok 4.20</text>
    <rect x="440" y="358" width="230" height="3" rx="1.5" fill="#21262d"/>
  </g>
  <g class="sp4"><circle cx="448" cy="345" r="5" fill="none" stroke="#f78166" stroke-width="1.5" stroke-dasharray="20 12" stroke-linecap="round"/></g>
  <g class="ck4">
    <circle cx="448" cy="345" r="6" fill="#3fb950" fill-opacity="0.15"/>
    <path d="M 443 345 L 446.5 348.5 L 453 342" stroke="#3fb950" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="dn4" x="670" y="350" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">5.1s</text>

  <!-- Per-model progress bars (SMIL) -->
  <rect x="440" y="178" width="0" height="3" rx="1.5" fill="url(#orange-grad)">
    <animate attributeName="width" values="0;0;230;230;0;0" keyTimes="0;0.22;0.40;0.42;0.43;1" dur="12s" repeatCount="indefinite"/>
  </rect>
  <rect x="440" y="238" width="0" height="3" rx="1.5" fill="url(#orange-grad)">
    <animate attributeName="width" values="0;0;230;230;0;0" keyTimes="0;0.24;0.43;0.45;0.46;1" dur="12s" repeatCount="indefinite"/>
  </rect>
  <rect x="440" y="298" width="0" height="3" rx="1.5" fill="url(#orange-grad)">
    <animate attributeName="width" values="0;0;230;230;0;0" keyTimes="0;0.26;0.46;0.48;0.49;1" dur="12s" repeatCount="indefinite"/>
  </rect>
  <rect x="440" y="358" width="0" height="3" rx="1.5" fill="url(#orange-grad)">
    <animate attributeName="width" values="0;0;230;230;0;0" keyTimes="0;0.28;0.49;0.51;0.52;1" dur="12s" repeatCount="indefinite"/>
  </rect>

  <!-- Traveling data packets: orange (outgoing) -->
  <circle r="3.5" fill="#f78166" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.01;0.15;0.17;1" dur="12s" repeatCount="indefinite"/>
    <animateMotion dur="12s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.01;0.17;1" calcMode="linear" path="M 250 258 L 320 258 L 320 165 L 430 165"/>
  </circle>
  <circle r="3.5" fill="#f78166" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.01;0.15;0.17;1" dur="12s" repeatCount="indefinite"/>
    <animateMotion dur="12s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.01;0.17;1" calcMode="linear" path="M 250 258 L 320 258 L 320 225 L 430 225"/>
  </circle>
  <circle r="3.5" fill="#f78166" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.01;0.15;0.17;1" dur="12s" repeatCount="indefinite"/>
    <animateMotion dur="12s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.01;0.17;1" calcMode="linear" path="M 250 258 L 320 258 L 320 285 L 430 285"/>
  </circle>
  <circle r="3.5" fill="#f78166" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.01;0.15;0.17;1" dur="12s" repeatCount="indefinite"/>
    <animateMotion dur="12s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.01;0.17;1" calcMode="linear" path="M 250 258 L 320 258 L 320 345 L 430 345"/>
  </circle>

  <!-- Traveling data packets: green (returning) -->
  <circle r="3.5" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.42;0.43;0.53;0.55;1" dur="12s" repeatCount="indefinite"/>
    <animateMotion dur="12s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.42;0.55;1" calcMode="linear" path="M 680 165 L 790 165 L 790 258 L 860 258"/>
  </circle>
  <circle r="3.5" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.44;0.45;0.54;0.56;1" dur="12s" repeatCount="indefinite"/>
    <animateMotion dur="12s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.44;0.56;1" calcMode="linear" path="M 680 225 L 790 225 L 790 258 L 860 258"/>
  </circle>
  <circle r="3.5" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.46;0.47;0.55;0.57;1" dur="12s" repeatCount="indefinite"/>
    <animateMotion dur="12s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.46;0.57;1" calcMode="linear" path="M 680 285 L 790 285 L 790 258 L 860 258"/>
  </circle>
  <circle r="3.5" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.49;0.50;0.57;0.59;1" dur="12s" repeatCount="indefinite"/>
    <animateMotion dur="12s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.49;0.59;1" calcMode="linear" path="M 680 345 L 790 345 L 790 258 L 860 258"/>
  </circle>

  <!-- Output card -->
  <g class="output-card">
    <g class="output-float">
      <rect x="870" y="210" width="210" height="100" rx="10" fill="#161b22" stroke="#3fb950" stroke-opacity="0.3" stroke-width="1" filter="url(#sh)"/>
      <text x="975" y="236" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#3fb950" letter-spacing="2.5" opacity="0.8">OUTPUT</text>
      <line x1="893" y1="246" x2="1057" y2="246" stroke="#21262d" stroke-width="1"/>
    </g>
  </g>
  <g class="output-float">
    <g class="ol1"><text x="893" y="266" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Judged by Claude</text></g>
    <g class="ol2"><text x="893" y="284" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Conflicts resolved</text></g>
    <g class="ol3"><text x="893" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" fill="#3fb950" font-weight="600">One clean answer</text></g>
  </g>
</svg>
