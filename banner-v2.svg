<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none">
  <style>
    /* Cloudflare-inspired animations */
    @keyframes shineIn {
      0% { opacity: 0; filter: blur(12px) brightness(2); }
      40% { opacity: 1; filter: blur(4px) brightness(1.4); }
      100% { opacity: 1; filter: blur(0px) brightness(1); }
    }
    @keyframes drawPath {
      0% { stroke-dashoffset: 200; opacity: 0.3; }
      30% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 1; }
    }
    @keyframes dashFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseRing {
      0% { opacity: 0.6; r: 6; }
      100% { opacity: 0; r: 16; }
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    @keyframes progressFill {
      from { width: 0; }
      to { width: 260; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .title { opacity: 0; animation: shineIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards; }
    .subtitle { opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }

    .cmd-box { opacity: 0; animation: fadeUp 0.5s ease 1.1s forwards; }
    .cmd-text { opacity: 0; animation: fadeUp 0.4s ease 1.5s forwards; }
    .cmd-cursor { opacity: 0; animation: fadeUp 0.01s ease 1.5s forwards, blink 1s step-end 1.5s infinite; }

    .path1 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawPath 0.8s ease 2.1s forwards; }
    .path1-flow { stroke-dasharray: 4 6; animation: dashFlow 0.6s linear 2.9s infinite; opacity: 0; }
    .path1-show { opacity: 0; animation: fadeUp 0.01s ease 2.9s forwards; }

    .card { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 2.6s forwards; }

    .model1 { opacity: 0; animation: fadeUp 0.35s ease 3.1s forwards; }
    .model2 { opacity: 0; animation: fadeUp 0.35s ease 3.3s forwards; }
    .model3 { opacity: 0; animation: fadeUp 0.35s ease 3.5s forwards; }
    .model4 { opacity: 0; animation: fadeUp 0.35s ease 3.7s forwards; }
    .model5 { opacity: 0; animation: fadeUp 0.35s ease 3.9s forwards; }

    .dot-pulse1 { animation: dotPulse 1.5s ease 3.1s infinite; }
    .dot-pulse2 { animation: dotPulse 1.5s ease 3.4s infinite; }
    .dot-pulse3 { animation: dotPulse 1.5s ease 3.7s infinite; }
    .dot-pulse4 { animation: dotPulse 1.5s ease 4.0s infinite; }

    .progress-track { opacity: 0; animation: fadeUp 0.3s ease 4.2s forwards; }

    .path2 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawPath 0.8s ease 4.6s forwards; }
    .path2-flow { stroke-dasharray: 4 6; animation: dashFlow 0.6s linear 5.4s infinite; opacity: 0; }
    .path2-show { opacity: 0; animation: fadeUp 0.01s ease 5.4s forwards; }

    .output-card { opacity: 0; animation: shineIn 0.8s ease 5.2s forwards; }
    .output-float { animation: gentleFloat 3s ease-in-out 5.8s infinite; }
    .out-line1 { opacity: 0; animation: fadeUp 0.3s ease 5.8s forwards; }
    .out-line2 { opacity: 0; animation: fadeUp 0.3s ease 6.0s forwards; }
    .out-line3 { opacity: 0; animation: fadeUp 0.3s ease 6.2s forwards; }

    .pulse-ring1 { animation: pulseRing 2s ease-out 6.4s infinite; }
    .pulse-ring2 { animation: pulseRing 2s ease-out 6.9s infinite; }
  </style>

  <defs>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#30363d" stop-opacity="0"/>
      <stop offset="20%" stop-color="#f78166"/>
      <stop offset="80%" stop-color="#f78166"/>
      <stop offset="100%" stop-color="#30363d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="progress-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f78166"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="soft-shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="warm-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#f78166" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="440" fill="#0d1117"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.5" fill="#f0f6fc" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="440" fill="url(#dots)"/>

  <!-- Horizontal accent line -->
  <line x1="100" y1="108" x2="1100" y2="108" stroke="#21262d" stroke-width="0.5"/>

  <!-- Title with shine-in -->
  <text class="title" x="600" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">smoothie</text>
  <text class="subtitle" x="600" y="88" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#7d8590" letter-spacing="0.5">multi-model review for Claude Code</text>

  <!-- === LEFT: Terminal === -->
  <g class="cmd-box">
    <rect x="42" y="220" width="195" height="70" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#soft-shadow)"/>
    <circle cx="60" cy="237" r="4" fill="#f85149" fill-opacity="0.7"/>
    <circle cx="73" cy="237" r="4" fill="#d29922" fill-opacity="0.7"/>
    <circle cx="86" cy="237" r="4" fill="#3fb950" fill-opacity="0.7"/>
  </g>
  <g class="cmd-text">
    <text x="58" y="270" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7d8590">$</text>
    <text x="72" y="270" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#f0f6fc">/smoothie</text>
  </g>
  <rect class="cmd-cursor" x="148" y="258" width="7" height="14" rx="1" fill="#f78166"/>

  <!-- === ARROW 1: drawn path === -->
  <path class="path1" d="M 250 255 C 300 255, 320 255, 410 255" stroke="#f78166" stroke-width="1.5" fill="none"/>
  <g class="path1-show">
    <path class="path1-flow" d="M 250 255 C 300 255, 320 255, 410 255" stroke="#f78166" stroke-width="1.5" fill="none" opacity="0.4"/>
    <polygon points="407,249 419,255 407,261" fill="#f78166" opacity="0.8"/>
    <text x="335" y="245" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#f78166" opacity="0.7">query all</text>
  </g>

  <!-- === CENTER: Model card === -->
  <g class="card">
    <rect x="425" y="140" width="350" height="250" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#soft-shadow)"/>
    <text x="600" y="170" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#7d8590" letter-spacing="2.5">PARALLEL BLEND</text>
    <line x1="455" y1="182" x2="745" y2="182" stroke="#21262d" stroke-width="1"/>
  </g>

  <!-- Model rows -->
  <g class="model1">
    <circle class="dot-pulse1" cx="460" cy="208" r="4" fill="#f78166"/>
    <circle class="pulse-ring1" cx="460" cy="208" r="6" fill="none" stroke="#f78166" stroke-width="0.5"/>
    <text x="476" y="212" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">Opus 4.6</text>
    <text x="735" y="212" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">done 2.1s</text>
  </g>
  <g class="model2">
    <circle class="dot-pulse2" cx="460" cy="238" r="4" fill="#f78166"/>
    <text x="476" y="242" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">GPT 5.4 Codex</text>
    <text x="735" y="242" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">done 3.8s</text>
  </g>
  <g class="model3">
    <circle class="dot-pulse3" cx="460" cy="268" r="4" fill="#f78166"/>
    <text x="476" y="272" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">Gemini 3.1 Pro</text>
    <text x="735" y="272" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">done 4.2s</text>
  </g>
  <g class="model4">
    <circle class="dot-pulse4" cx="460" cy="298" r="4" fill="#f78166"/>
    <text x="476" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">Grok 4.20</text>
    <text x="735" y="302" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">done 5.1s</text>
  </g>
  <g class="model5">
    <text x="476" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#484f58">+ more via OpenRouter</text>
  </g>

  <!-- Progress bar -->
  <g class="progress-track">
    <rect x="455" y="352" width="290" height="3" rx="1.5" fill="#21262d"/>
    <rect x="455" y="352" width="290" height="3" rx="1.5" fill="url(#progress-grad)" opacity="0.7"/>
    <text x="600" y="375" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#3fb950" opacity="0.8">5/5 responded</text>
  </g>

  <!-- === ARROW 2: drawn path === -->
  <path class="path2" d="M 788 255 C 840 255, 860 255, 935 255" stroke="#3fb950" stroke-width="1.5" fill="none"/>
  <g class="path2-show">
    <path class="path2-flow" d="M 788 255 C 840 255, 860 255, 935 255" stroke="#3fb950" stroke-width="1.5" fill="none" opacity="0.4"/>
    <polygon points="932,249 944,255 932,261" fill="#3fb950" opacity="0.8"/>
    <text x="865" y="245" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#3fb950" opacity="0.7">judge</text>
  </g>

  <!-- === RIGHT: Output === -->
  <g class="output-card">
    <g class="output-float">
      <rect x="950" y="195" width="210" height="120" rx="12" fill="#161b22" stroke="#3fb950" stroke-opacity="0.3" stroke-width="1" filter="url(#soft-shadow)"/>
      <text x="1055" y="222" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#3fb950" letter-spacing="2.5" opacity="0.8">OUTPUT</text>
      <line x1="975" y1="232" x2="1135" y2="232" stroke="#21262d" stroke-width="1"/>
    </g>
  </g>
  <g class="output-float">
    <g class="out-line1">
      <text x="975" y="254" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" fill="#8b949e">Judged by Claude</text>
    </g>
    <g class="out-line2">
      <text x="975" y="274" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" fill="#8b949e">Conflicts resolved</text>
    </g>
    <g class="out-line3">
      <text x="975" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#3fb950" font-weight="600">One clean answer</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <line x1="100" y1="415" x2="1100" y2="415" stroke="#21262d" stroke-width="0.5"/>
</svg>
