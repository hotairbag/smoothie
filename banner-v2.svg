<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none">
  <style>
    /* Total cycle: 14s (10s animation + 4s hold/fade) */

    @keyframes shineIn {
      0% { opacity: 0; filter: blur(12px) brightness(2); }
      3% { opacity: 1; filter: blur(4px) brightness(1.4); }
      8% { opacity: 1; filter: blur(0px) brightness(1); }
      72% { opacity: 1; filter: blur(0px) brightness(1); }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes fadeUp14 {
      0%, 100% { opacity: 0; transform: translateY(10px); }
      4% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; transform: translateY(0); }
      78% { opacity: 0; transform: translateY(0); }
    }
    @keyframes cmdBox {
      0%, 7% { opacity: 0; transform: translateY(10px); }
      10% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes cmdText {
      0%, 10% { opacity: 0; }
      13% { opacity: 1; }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes blink14 {
      0%, 10% { opacity: 0; }
      10.1%, 10.5% { opacity: 1; }
      11%, 11.5% { opacity: 0; }
      11.5%, 12% { opacity: 1; }
      12.5%, 13% { opacity: 0; }
      13%, 72% { opacity: 1; }
      78%, 100% { opacity: 0; }
    }
    @keyframes drawPath1 {
      0%, 14% { stroke-dashoffset: 200; opacity: 0; }
      15% { opacity: 0.3; }
      20% { stroke-dashoffset: 0; opacity: 1; }
      72% { stroke-dashoffset: 0; opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; stroke-dashoffset: 200; }
    }
    @keyframes arrowShow1 {
      0%, 20% { opacity: 0; }
      21% { opacity: 1; }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes dashFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes cardIn {
      0%, 18% { opacity: 0; transform: translateY(10px); }
      22% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes model1 {
      0%, 21% { opacity: 0; transform: translateY(10px); }
      24% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes model2 {
      0%, 23% { opacity: 0; transform: translateY(10px); }
      26% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes model3 {
      0%, 25% { opacity: 0; transform: translateY(10px); }
      28% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes model4 {
      0%, 27% { opacity: 0; transform: translateY(10px); }
      30% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes model5 {
      0%, 29% { opacity: 0; transform: translateY(10px); }
      32% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin1vis {
      0%, 21% { opacity: 0; }
      22% { opacity: 1; }
      36% { opacity: 1; }
      37% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes spin2vis {
      0%, 23% { opacity: 0; }
      24% { opacity: 1; }
      39% { opacity: 1; }
      40% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes spin3vis {
      0%, 25% { opacity: 0; }
      26% { opacity: 1; }
      42% { opacity: 1; }
      43% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes spin4vis {
      0%, 27% { opacity: 0; }
      28% { opacity: 1; }
      45% { opacity: 1; }
      46% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes checkPop {
      0% { opacity: 0; transform: scale(0); }
      60% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes check1 {
      0%, 36% { opacity: 0; transform: scale(0); }
      38% { opacity: 1; transform: scale(1.2); }
      39% { opacity: 1; transform: scale(1); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes check2 {
      0%, 39% { opacity: 0; transform: scale(0); }
      41% { opacity: 1; transform: scale(1.2); }
      42% { opacity: 1; transform: scale(1); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes check3 {
      0%, 42% { opacity: 0; transform: scale(0); }
      44% { opacity: 1; transform: scale(1.2); }
      45% { opacity: 1; transform: scale(1); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes check4 {
      0%, 45% { opacity: 0; transform: scale(0); }
      47% { opacity: 1; transform: scale(1.2); }
      48% { opacity: 1; transform: scale(1); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes done1 {
      0%, 36% { opacity: 0; }
      37% { opacity: 1; }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes done2 {
      0%, 39% { opacity: 0; }
      40% { opacity: 1; }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes done3 {
      0%, 42% { opacity: 0; }
      43% { opacity: 1; }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes done4 {
      0%, 45% { opacity: 0; }
      46% { opacity: 1; }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes progressIn {
      0%, 48% { opacity: 0; transform: translateY(10px); }
      51% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes drawPath2 {
      0%, 51% { stroke-dashoffset: 200; opacity: 0; }
      52% { opacity: 0.3; }
      57% { stroke-dashoffset: 0; opacity: 1; }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; stroke-dashoffset: 200; }
    }
    @keyframes arrowShow2 {
      0%, 57% { opacity: 0; }
      58% { opacity: 1; }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes outputIn {
      0%, 54% { opacity: 0; filter: blur(12px) brightness(2); }
      58% { opacity: 1; filter: blur(4px) brightness(1.4); }
      62% { opacity: 1; filter: blur(0px) brightness(1); }
      72% { opacity: 1; filter: blur(0px) brightness(1); }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes outLine1 {
      0%, 60% { opacity: 0; transform: translateY(10px); }
      63% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes outLine2 {
      0%, 62% { opacity: 0; transform: translateY(10px); }
      65% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes outLine3 {
      0%, 64% { opacity: 0; transform: translateY(10px); }
      67% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; }
      78% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }

    .title { animation: shineIn 14s ease infinite; }
    .subtitle { animation: fadeUp14 14s ease infinite; }

    .cmd-box { animation: cmdBox 14s ease infinite; }
    .cmd-text { animation: cmdText 14s ease infinite; }
    .cmd-cursor { animation: blink14 14s ease infinite; }

    .path1 { stroke-dasharray: 200; animation: drawPath1 14s ease infinite; }
    .path1-show { animation: arrowShow1 14s ease infinite; }
    .path1-flow { stroke-dasharray: 4 6; animation: dashFlow 0.6s linear infinite; }

    .card { animation: cardIn 14s ease infinite; }

    .model1 { animation: model1 14s ease infinite; }
    .model2 { animation: model2 14s ease infinite; }
    .model3 { animation: model3 14s ease infinite; }
    .model4 { animation: model4 14s ease infinite; }
    .model5 { animation: model5 14s ease infinite; }

    .spin1 { transform-origin: 460px 208px; animation: spin 0.8s linear infinite, spin1vis 14s ease infinite; }
    .spin2 { transform-origin: 460px 238px; animation: spin 0.8s linear infinite, spin2vis 14s ease infinite; }
    .spin3 { transform-origin: 460px 268px; animation: spin 0.8s linear infinite, spin3vis 14s ease infinite; }
    .spin4 { transform-origin: 460px 298px; animation: spin 0.8s linear infinite, spin4vis 14s ease infinite; }

    .check1 { transform-origin: 460px 208px; animation: check1 14s ease infinite; }
    .check2 { transform-origin: 460px 238px; animation: check2 14s ease infinite; }
    .check3 { transform-origin: 460px 268px; animation: check3 14s ease infinite; }
    .check4 { transform-origin: 460px 298px; animation: check4 14s ease infinite; }

    .done1 { animation: done1 14s ease infinite; }
    .done2 { animation: done2 14s ease infinite; }
    .done3 { animation: done3 14s ease infinite; }
    .done4 { animation: done4 14s ease infinite; }

    .progress-track { animation: progressIn 14s ease infinite; }

    .path2 { stroke-dasharray: 200; animation: drawPath2 14s ease infinite; }
    .path2-show { animation: arrowShow2 14s ease infinite; }
    .path2-flow { stroke-dasharray: 4 6; animation: dashFlow 0.6s linear infinite; }

    .output-card { animation: outputIn 14s ease infinite; }
    .output-float { animation: gentleFloat 3s ease-in-out infinite; }
    .out-line1 { animation: outLine1 14s ease infinite; }
    .out-line2 { animation: outLine2 14s ease infinite; }
    .out-line3 { animation: outLine3 14s ease infinite; }
  </style>

  <defs>
    <linearGradient id="progress-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f78166"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="soft-shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="440" fill="#0d1117"/>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.5" fill="#f0f6fc" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="440" fill="url(#dots)"/>

  <!-- Accent lines -->
  <line x1="100" y1="108" x2="1100" y2="108" stroke="#21262d" stroke-width="0.5"/>
  <line x1="100" y1="415" x2="1100" y2="415" stroke="#21262d" stroke-width="0.5"/>

  <!-- Title -->
  <text class="title" x="600" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">smoothie</text>
  <text class="subtitle" x="600" y="88" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#7d8590" letter-spacing="0.5">multi-model review for Claude Code</text>

  <!-- === LEFT: Terminal === -->
  <g class="cmd-box">
    <rect x="42" y="220" width="195" height="70" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#soft-shadow)"/>
    <circle cx="60" cy="237" r="4" fill="#f85149" fill-opacity="0.7"/>
    <circle cx="73" cy="237" r="4" fill="#d29922" fill-opacity="0.7"/>
    <circle cx="86" cy="237" r="4" fill="#3fb950" fill-opacity="0.7"/>
  </g>
  <g class="cmd-text">
    <text x="58" y="270" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7d8590">$</text>
    <text x="72" y="270" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#f0f6fc">/smoothie</text>
  </g>
  <rect class="cmd-cursor" x="148" y="258" width="7" height="14" rx="1" fill="#f78166"/>

  <!-- === ARROW 1 === -->
  <path class="path1" d="M 250 255 C 300 255, 320 255, 410 255" stroke="#f78166" stroke-width="1.5" fill="none"/>
  <g class="path1-show">
    <g class="path1-flow">
      <path d="M 250 255 C 300 255, 320 255, 410 255" stroke="#f78166" stroke-width="1.5" fill="none" opacity="0.4"/>
    </g>
    <polygon points="407,249 419,255 407,261" fill="#f78166" opacity="0.8"/>
    <text x="335" y="245" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#f78166" opacity="0.7">query all</text>
  </g>

  <!-- === CENTER: Model card === -->
  <g class="card">
    <rect x="425" y="140" width="350" height="250" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#soft-shadow)"/>
    <text x="600" y="170" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#7d8590" letter-spacing="2.5">PARALLEL BLEND</text>
    <line x1="455" y1="182" x2="745" y2="182" stroke="#21262d" stroke-width="1"/>
  </g>

  <!-- Model 1: Opus -->
  <g class="model1">
    <text x="480" y="212" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">Opus 4.6</text>
  </g>
  <g class="spin1">
    <circle cx="460" cy="208" r="5" fill="none" stroke="#f78166" stroke-width="1.5" stroke-dasharray="20 12" stroke-linecap="round"/>
  </g>
  <g class="check1">
    <circle cx="460" cy="208" r="6" fill="#3fb950" fill-opacity="0.15"/>
    <path d="M 455 208 L 458.5 211.5 L 465 205" stroke="#3fb950" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="done1" x="735" y="212" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">2.1s</text>

  <!-- Model 2: GPT Codex -->
  <g class="model2">
    <text x="480" y="242" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">GPT 5.4 Codex</text>
  </g>
  <g class="spin2">
    <circle cx="460" cy="238" r="5" fill="none" stroke="#f78166" stroke-width="1.5" stroke-dasharray="20 12" stroke-linecap="round"/>
  </g>
  <g class="check2">
    <circle cx="460" cy="238" r="6" fill="#3fb950" fill-opacity="0.15"/>
    <path d="M 455 238 L 458.5 241.5 L 465 235" stroke="#3fb950" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="done2" x="735" y="242" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">3.8s</text>

  <!-- Model 3: Gemini -->
  <g class="model3">
    <text x="480" y="272" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">Gemini 3.1 Pro</text>
  </g>
  <g class="spin3">
    <circle cx="460" cy="268" r="5" fill="none" stroke="#f78166" stroke-width="1.5" stroke-dasharray="20 12" stroke-linecap="round"/>
  </g>
  <g class="check3">
    <circle cx="460" cy="268" r="6" fill="#3fb950" fill-opacity="0.15"/>
    <path d="M 455 268 L 458.5 271.5 L 465 265" stroke="#3fb950" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="done3" x="735" y="272" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">4.2s</text>

  <!-- Model 4: Grok -->
  <g class="model4">
    <text x="480" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#f0f6fc">Grok 4.20</text>
  </g>
  <g class="spin4">
    <circle cx="460" cy="298" r="5" fill="none" stroke="#f78166" stroke-width="1.5" stroke-dasharray="20 12" stroke-linecap="round"/>
  </g>
  <g class="check4">
    <circle cx="460" cy="298" r="6" fill="#3fb950" fill-opacity="0.15"/>
    <path d="M 455 298 L 458.5 301.5 L 465 295" stroke="#3fb950" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="done4" x="735" y="302" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">5.1s</text>

  <!-- Model 5: more -->
  <g class="model5">
    <text x="480" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#484f58">+ more via OpenRouter</text>
  </g>

  <!-- Progress bar -->
  <g class="progress-track">
    <rect x="455" y="352" width="290" height="3" rx="1.5" fill="#21262d"/>
    <rect x="455" y="352" width="290" height="3" rx="1.5" fill="url(#progress-grad)" opacity="0.7"/>
    <text x="600" y="375" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#3fb950" opacity="0.8">all models responded</text>
  </g>

  <!-- === ARROW 2 === -->
  <path class="path2" d="M 788 255 C 840 255, 860 255, 935 255" stroke="#3fb950" stroke-width="1.5" fill="none"/>
  <g class="path2-show">
    <g class="path2-flow">
      <path d="M 788 255 C 840 255, 860 255, 935 255" stroke="#3fb950" stroke-width="1.5" fill="none" opacity="0.4"/>
    </g>
    <polygon points="932,249 944,255 932,261" fill="#3fb950" opacity="0.8"/>
    <text x="865" y="245" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#3fb950" opacity="0.7">judge</text>
  </g>

  <!-- === RIGHT: Output === -->
  <g class="output-card">
    <g class="output-float">
      <rect x="950" y="195" width="210" height="120" rx="12" fill="#161b22" stroke="#3fb950" stroke-opacity="0.3" stroke-width="1" filter="url(#soft-shadow)"/>
      <text x="1055" y="222" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#3fb950" letter-spacing="2.5" opacity="0.8">OUTPUT</text>
      <line x1="975" y1="232" x2="1135" y2="232" stroke="#21262d" stroke-width="1"/>
    </g>
  </g>
  <g class="output-float">
    <g class="out-line1">
      <text x="975" y="254" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" fill="#8b949e">Judged by Claude</text>
    </g>
    <g class="out-line2">
      <text x="975" y="274" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" fill="#8b949e">Conflicts resolved</text>
    </g>
    <g class="out-line3">
      <text x="975" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#3fb950" font-weight="600">One clean answer</text>
    </g>
  </g>
</svg>
